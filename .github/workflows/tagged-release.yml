name: Create tagged prerelease

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Inject dummy credentials
        run: |
          cat <<EOF > local.properties
          POSTHOG_API_KEY=dummy
          POSTHOG_HOST=https://us.i.posthog.com
          EOF

      - name: Build unsigned APK
        run: ./gradlew :app:assembleRelease -x lintVitalRelease

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-apk
          path: app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download unsigned APK
        uses: actions/download-artifact@v4
        with:
          name: unsigned-apk
          path: ./

      - name: Rename APK
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mv app-release.apk "genshinimpact-${TAG}-unsigned.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          files: genshinimpact-${{ github.ref_name }}-unsigned.apk
          body: |
            ## Unsigned build — sign before installing

            Download `genshinimpact-${{ github.ref_name }}-unsigned.apk` and sign it with your key:

            ```
            apksigner sign \
              --ks your-keystore.jks \
              --ks-key-alias your-alias \
              --out genshinimpact-signed.apk \
              genshinimpact-${{ github.ref_name }}-unsigned.apk
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
